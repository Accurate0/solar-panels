name: Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-web:
    permissions:
      packages: write

    uses: Accurate0/workflows/.github/workflows/build-push-docker.yaml@d5901e9bdd4392143298bc1a85e25f33096110f9 # main
    with:
      directory: web
      image-name: solar-web
      docker-build-args: ""
      use-rust-caching: true

  build:
    permissions:
      packages: write

    uses: Accurate0/workflows/.github/workflows/build-push-docker.yaml@d5901e9bdd4392143298bc1a85e25f33096110f9 # main
    with:
      directory: .
      image-name: solar
      docker-build-args: |
        BINARY_NAME=solar
      use-rust-caching: true

  deploy:
    needs:
      - build
      - build-web
    uses: Accurate0/workflows/.github/workflows/deploy-app-k8s-v2.yaml@d5901e9bdd4392143298bc1a85e25f33096110f9 # main
    with:
      service-name: solar-panels
      images: ghcr.io/accurate0/solar,ghcr.io/accurate0/solar-web
      manifests-path: projects/solar-panels/manifests
      tag: ${{ github.sha }}
    secrets:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_CI_IMAGE_UPDATER }}
